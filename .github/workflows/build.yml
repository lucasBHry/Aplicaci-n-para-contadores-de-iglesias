name: Build

on:
  push:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: cd ofrendas-app && npm install
      - run: cd ofrendas-app && npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: ofrendas-app/dist/*.dmg
